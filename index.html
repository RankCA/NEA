<!DOCTYPE html>
<html>
  <head>
    <title>1v1Maths.io</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script type="module">import 'https://unpkg.com/mathlive?module';</script>
  </head>
  
  <body>
    <div id="topbar">
      <h1 id="title">1v1Maths.io</h1>
      <button id="settingsbtn" style="display:none" title="Settings">⚙</button>
    </div>

    <!-- Settings modal -->
    <div id="settings-modal" class="hidden-section">
      <div id="settings-box">
        <h3>Settings</h3>
        <button id="logoutbtn">Log Out</button>
        <button id="settings-closebtn">Close</button>
      </div>
    </div>
    
    <div id="LandingPage">
      <button id="LogInbtn">Log In</button>
      <button id="CreateAccountbtn">Create Account</button>
    </div>
    
    <div id="CreateAccount" class="hidden-section">
      <h2>Create an Account</h2>
      <form id="signupform">
        <input type="text" placeholder="Email"><br>
        <input type="text" placeholder="Username (3 chars min)"><br>
        <input type="password" placeholder="Password (8 chars min)"><br>
        <input type="submit">
        <p id="authwarning">An authentication email will be sent to your inbox</p>
      </form>
    </div>
    
    <div id="LogIn" class="hidden-section">
      <h2>Welcome Back</h2>
      <form id="loginform">
        <input type="text" placeholder="Email"><br>
        <input type="password" placeholder="Password"><br>
        <input type="submit">
        <p id="warning" style="display:none;"></p>
      </form>
    </div>
    
    <div id="MainMenu" class="hidden-section">
      <h2>Welcome Back, <span id="mainmenu-username">[username]</span></h2>
      <p>We have 250+ Maths Problems from Pearson AS Pure Maths</p>
      <p id="online-counter"><span id="online-count">0</span> x Online</p>
      <div id="user-stats">
        <p id="stat-week">—</p>
        <p id="stat-record">—</p>
      </div>
      <button id="solorevisionbtn">Solo Revision</button>
      <button>Create Lobby</button>
    </div>
    
    <div id="SoloSetup" class="hidden-section">
      <div class="page-nav">
        <button class="back-btn" id="solosetup-backbtn">← Main Menu</button>
      </div>
      <h2>Choose Topics</h2>
      <div id="topic-list"></div>
      <button id="startrevisionbtn">Start Revision</button>
    </div>

    <div id="SoloDisplay" class="hidden-section">
      <div class="page-nav">
        <button class="back-btn" id="solodisplay-quitbtn">✕ Quit Session</button>
      </div>

      <div id="stopwatch">0:00</div>

      <div id="question-display-a"></div>
      <div id="question-display-b"></div>

      <div id="diagram-container">
        <div id="diagram-calculator"></div>
      </div>

      <form id="answerform">
        <div id="answer-fields-container"></div>
        <br>
        <input type="submit" value="Submit">
      </form>

      <div id="result"></div>

      <div id="leaderboard-panel" class="hidden-section">
        <h3 id="leaderboard-title">Top 5 — This Question</h3>
        <table id="leaderboard-table">
          <tbody id="leaderboard-tbody"></tbody>
        </table>
      </div>

      <button id="nextquestionbtn">Next Question</button>
    </div>
    
    <div id="adminnav">
      <button id="adminnav1">Landing Page</button>
      <button id="adminnav2">Create Account</button>
      <button id="adminnav3">Log In</button>
      <button id="adminnav4">Main Menu</button>
      <button id="adminnav5">Solo Setup</button>
      <button id="adminnav6">Solo Display</button>
      <button id="adminnav7">Lobby Setup</button>
      <button id="adminnav8">Lobby Join</button>
      <button id="adminnav9">Lobby Wait</button>
      <button id="adminnav10">vs Display</button>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script src="script.js"></script>
  </body>
</html>
