<!DOCTYPE html>
<html>
  <head>
    <title>1v1Maths.io</title>
    <link rel="stylesheet" href="styles.css"/>
  </head>
  
  <body>
    <h1 id="title">1v1Maths.io</h1>
    
    <div id="LandingPage">
      <button id="LogInbtn">Log In</button>
      <button id="CreateAccountbtn">Create Account</button>
    </div>
    
    
    <div id="CreateAccount" class="hidden-section">
      <h2>Create an Account</h2>
      <form>
        <input type="text" placeholder="Email"><br>
        <input type="text" placeholder="Username (3 chars min)"><br>
        <input type="password" placeholder="Password (8 chars min)"><br>
        <input type="submit">
        <p id="authwarning">An authentication email will be sent to your inbox</p>
        
      </form>
    </div>
    
    
    <div id="LogIn" class="hidden-section">
      
    </div>
    
    
    <div id="MainMenu" class="hidden-section">
      <p>We have 250+ Maths Problems from Pearson AS Pure Maths</p>
      <button>Solo Revision</button>
      <button>Create Lobby</button>
    </div>
    
    
    <div id="SoloDisplay" class="hidden-section">
    </div>
    
    
    <div id="adminnav">
      <button id="adminnav1">Landing Page</button>
      <button id="adminnav2">Create Account</button>
      <button id="adminnav3">Log In</button>
      <button id="adminnav4">Main Menu</button>
      <button id="adminnav5">Solo Setup</button>
      <button id="adminnav6">Solo Display</button>
      <button id="adminnav7">Lobby Setup</button>
      <button id="adminnav8">Lobby Join</button>
      <button id="adminnav9">Lobby Wait</button>
      <button id="adminnav10">vs Display</button>
    </div>
    
    
    <script src="script.js"></script>
  </body>
</html>
